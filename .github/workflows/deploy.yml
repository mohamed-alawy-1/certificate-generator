name: Deploy To VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.VPS_HOST != '' && secrets.VPS_HOST || vars.VPS_HOST }}
      DEPLOY_USER: ${{ secrets.VPS_USER != '' && secrets.VPS_USER || vars.VPS_USER }}
      DEPLOY_PORT: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || vars.VPS_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Deploy Config
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_HOST}" ]]; then
            echo "::error::Missing VPS host. Set secret VPS_HOST (or repository variable VPS_HOST)."
            exit 1
          fi
          if [[ -z "${DEPLOY_USER}" ]]; then
            echo "::error::Missing VPS user. Set secret VPS_USER (or repository variable VPS_USER)."
            exit 1
          fi
          if [[ -z "${{ secrets.VPS_SSH_KEY }}" ]]; then
            echo "::error::Missing VPS SSH key. Set secret VPS_SSH_KEY."
            exit 1
          fi

      - name: Prepare SSH Key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy over SSH
        shell: bash
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          APP_DIR_VALUE="$HOME/certificate-dashboard"

          ssh -o StrictHostKeyChecking=accept-new -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$APP_DIR_VALUE' BRANCH='main' bash -s" <<'REMOTE'
          set -euo pipefail

          if [ ! -f "$APP_DIR/scripts/ops/deploy.sh" ]; then
            if ! command -v git >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y git
            fi
            rm -rf "$APP_DIR"
            git clone https://github.com/mohamed-alawy-1/certificate-generator.git "$APP_DIR"
          fi

          cd "$APP_DIR"
          chmod +x scripts/ops/*.sh
          ./scripts/ops/deploy.sh
          REMOTE
