name: Deploy To VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.VPS_HOST != '' && secrets.VPS_HOST || vars.VPS_HOST }}
      DEPLOY_USER: ${{ secrets.VPS_USER != '' && secrets.VPS_USER || vars.VPS_USER }}
      DEPLOY_PORT: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || vars.VPS_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Deploy Config
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_HOST}" ]]; then
            echo "::error::Missing VPS host. Set secret VPS_HOST (or repository variable VPS_HOST)."
            exit 1
          fi
          if [[ -z "${DEPLOY_USER}" ]]; then
            echo "::error::Missing VPS user. Set secret VPS_USER (or repository variable VPS_USER)."
            exit 1
          fi
          if [[ -z "${{ secrets.VPS_SSH_KEY }}" ]]; then
            echo "::error::Missing VPS SSH key. Set secret VPS_SSH_KEY."
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT != '' && env.DEPLOY_PORT || '22' }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            export APP_DIR="${{ secrets.APP_DIR != '' && secrets.APP_DIR || vars.APP_DIR }}"
            export BRANCH="main"
            if [ -z "$APP_DIR" ]; then
              export APP_DIR="$HOME/certificate-dashboard"
            fi

            if [ ! -f "$APP_DIR/deploy.sh" ]; then
              if ! command -v git >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y git
              fi
              rm -rf "$APP_DIR"
              git clone https://github.com/mohamed-alawy-1/certificate-generator.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            chmod +x deploy.sh
            ./deploy.sh
