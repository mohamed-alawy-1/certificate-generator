name: Deploy To VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            export APP_DIR="${{ secrets.APP_DIR }}"
            export BRANCH="main"
            if [ -z "$APP_DIR" ]; then
              export APP_DIR="$HOME/certificate-dashboard"
            fi

            if [ ! -f "$APP_DIR/deploy.sh" ]; then
              if ! command -v git >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y git
              fi
              rm -rf "$APP_DIR"
              git clone https://github.com/mohamed-alawy-1/certificate-generator.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            chmod +x deploy.sh
            ./deploy.sh
