services:
  app:
    build: .
    container_name: certdash-app
    expose:
      - "5000"
    ports:
      - "127.0.0.1:8002:5000"
    env_file: .env
    volumes:
      - ./config/service-accounts:/app/service-accounts:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - certdash-network

networks:
  certdash-network:
    driver: bridge
